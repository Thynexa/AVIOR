# Generated by `avior init --ci gitlab` (FR-INIT-3). This file is yours to
# edit; `avior init` never overwrites an existing configuration.
#
# The job runs the read-only gate `avior check` against the COMMITTED
# validation baseline (inventory/scores/decisions): exit 0 = green,
# 1 = validation findings, 2 = execution error. It deliberately does not
# re-run `avior scan`/`avior assess` — regenerating the baseline in CI
# would erase the drift signal the gate exists to catch.
avior-check:
  image: rocker/r-ver:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    # TODO: adapt this line to how your organisation installs avior
    # (internal CRAN-like repository, r-universe, or a vendored tarball).
    - Rscript -e 'install.packages("avior")'
    - Rscript -e 'quit(save = "no", status = avior::main(c("check", "--format", "json")))'
