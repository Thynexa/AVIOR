# Generated by `avior init --ci github` (FR-INIT-3). This file is yours to
# edit; `avior init` never overwrites an existing workflow.
#
# The job runs the read-only gate `avior check` against the COMMITTED
# validation baseline (inventory/scores/decisions): exit 0 = green,
# 1 = validation findings, 2 = execution error. It deliberately does not
# re-run `avior scan`/`avior assess` — regenerating the baseline in CI
# would erase the drift signal the gate exists to catch.
name: avior-validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  avior-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # Pin this source to a release/SHA, or replace it with your organisation's
      # internal CRAN-like repository, r-universe, or vendored tarball.
      - name: Install avior
        run: Rscript -e 'install.packages("pak"); pak::pak("Thynexa/AVIOR")'
      - name: avior check
        run: Rscript -e 'quit(save = "no", status = avior::main(c("check", "--format", "json")))'
