  sec1.title: "1. Methodology and compliance anchors"
  sec1.body: "This validation follows the R Validation Hub white paper's four risk-assessment criteria (purpose/type, maintenance, community usage, testing), aligns with the ISPE GAMP 5 minimum deliverables (specification, risk assessment, testing, traceability matrix), and applies the intended-for-use focus: in-depth validation targets only the packages the project calls directly, while transitive dependencies are version-managed. Compliance responsibility remains with the sponsor; this report is one piece of evidence, not a compliance judgment."
  sec2.title: "2. Scope and boundary statement"
  sec2.proves: "This evidence bundle demonstrates that the R package environment used by this project has been assessed, decided, and target-tested commensurate with risk under the declared policy, and that the environment is reproducible."
  sec2.not_covered_lead: "This evidence bundle does NOT cover the following items, whose ownership is:"
  sec2.not_covered.header_item: "Out of scope"
  sec2.not_covered.header_owner: "Ownership and basis"
  sec2.not_covered.iq_oq_pq: "Computing-environment qualification (IQ/OQ/PQ)"
  sec2.not_covered.iq_oq_pq_owner: "Sponsor IT responsibility under its QMS, governed by GAMP 5; the R Validation Hub white paper explicitly places infrastructure qualification out of scope"
  sec2.not_covered.analysis_code: "Validation of project analysis code (double programming / independent QC)"
  sec2.not_covered.analysis_code_owner: "Program-validation domain owned by the sponsor's statistical programming process; package-environment evidence is one precondition for trustworthy results, not the whole"
  sec2.not_covered.part11: "21 CFR Part 11 electronic records/signature controls"
  sec2.not_covered.part11_owner: "Host system (QMS/eDMS) responsibility; this bundle is signature-ready and signing happens in the sponsor's system"
  sec2.exemption_lead: "Layered basis for the default exemption of base/recommended packages:"
  sec2.exemption.fact: "Factual basis - the R Foundation document \"R: Regulatory Compliance and Validation Issues\" (R-FDA.pdf) supports the FACT that base R and the recommended packages belong to the official R distribution and are developed and maintained by R Core under its SDLC. That document does not conclude \"low risk\"; it requires end-user organisations to define their own SOPs and risk controls per intended use."
  sec2.exemption.policy: "Policy inference - \"default exemption (low-risk starting point)\" is AVIOR's policy default (adopted by this project's avior.yml); its risk-tiering methodology comes from the R Validation Hub white paper's four criteria. The exemption is not absolute: scope.include pulls a package back into assessment scope based on its use."
  sec2.force_included: "In this project the following default-exempt package(s) were pulled back into scope via scope.include: {packages}."
  sec2.excluded: "The following package(s) were excluded from scope via scope.exclude: {packages}."
