  appendix_b.title: "Appendix B - Integrity"
  appendix_b.manifest: "The SHA-256 of every file in this bundle is recorded in MANIFEST.sha256. An auditor can verify independently with `avior verify` (or standard `sha256sum -c`) without any project context. The input snapshots live under snapshot/ as compilation-time copies of the policy, inventory, scores, decisions, and test results."
  appendix_b.trust: "Trust boundary: the manifest guarantees the bundle's INTERNAL consistency (against accidental damage and naive tampering). For a loose directory or zip detached from version control, the anti-tamper anchor is external - the git commit containing the evidence directory, a QMS archival record, or an independent signature. BUNDLE.yml's integrity_check is a generation-time self-attestation. None of these alone is a trust root."
